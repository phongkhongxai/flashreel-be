server:
  port: 8080
spring:
  application:
    name: short-videos-appx
  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3307/short_video}"
    driverClassName: "com.mysql.cj.jdbc.Driver"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:}"
  servlet:
    multipart:
      max-file-size: 300MB
      max-request-size: 300MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: "${MAIL_HOST:smtp.gmail.com}"
    port: ${MAIL_PORT:587}
    username: "${MAIL_USERNAME:}"
    password: "${MAIL_PASSWORD:}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

outbound:
  identity:
    client-id: "${GOOGLE_CLIENT_ID:}"
    client-secret: "${GOOGLE_CLIENT_SECRET:}"
    redirect-uri: "${GOOGLE_REDIRECT_URI:https://flashreel-fe.shares.zrok.io/mobile/oauth/callback}"

jwt:
  signerKey: "${JWT_SIGNER_KEY:}"
  valid-duration: 3600 # in sondec
  refreshable-duration: 360000 # in seconds

app:
  minio:
    endpoint: "${MINIO_ENDPOINT:http://localhost:9000}"
    public-url: "${MINIO_PUBLIC_URL:https://flashreel-storage.shares.zrok.io}"
    access-key: "${MINIO_ACCESS_KEY:}"
    secret-key: "${MINIO_SECRET_KEY:}"
    bucket: "${MINIO_BUCKET:short-videos}"
    create-bucket: true
    public-read: true
  video:
    ffmpeg-path: "ffmpeg"
    thumbnail-timeout-seconds: 15

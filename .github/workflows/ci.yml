name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: short_video
          MYSQL_ROOT_PASSWORD: ci-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -pci-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_URL: jdbc:mysql://localhost:3306/short_video?useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ci-password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SIGNER_KEY: ci-only-signing-key-that-is-not-a-secret
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: ci-access-key
      MINIO_SECRET_KEY: ci-secret-key
      MINIO_BUCKET: short-videos-ci
      APP_MINIO_CREATEBUCKET: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Grant Maven Wrapper execute permission
        run: chmod +x mvnw

      - name: Build and test
        run: ./mvnw -B -e verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore
